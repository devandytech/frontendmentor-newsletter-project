<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="../img/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Sign up confirmed</title>
  <style>
    /* Button hover/active styles to match the design (pink → orange gradient + soft glow) */
    .button2 {
      transition: background 200ms ease, box-shadow 220ms ease, transform 120ms ease;
      background: hsl(234,29%,20%); /* keep original dark color as default */
      color: hsl(0,0%,100%);
    }

    .button2:hover {
      background: linear-gradient(90deg, #ff7a92 0%, #ff6b66 48%, #ff6b3a 100%);
      box-shadow: 0 18px 30px rgba(255, 99, 107, 0.28);
      transform: translateY(-3px);
    }

    .button2:focus-visible {
      outline: 3px solid rgba(255,99,107,0.14);
      outline-offset: 4px;
    }
  </style>
</head>

<body class="md:bg-[hsl(235,18%,26%)] md:flex md:h-screen md:items-center md:justify-center">
    <!-- success message container -->
    <div class="confirmation w-[90%] max-sm:min-h-screen text-[16px] m-auto flex flex-col justify-between md:w-[50%] md:h-auto md:block md:border md:border-black md:border-solid md:mx-auto md:my-10 md:p-[3.2em] md:rounded-3xl bg-[hsl(0,0%,100%)]">
        <div class="w-[100%] m-auto">
          <img class="w-[18%] h-min-screen" src="../img/icon-success.svg" alt="checkmark image">
          
          <h1 class="text-[50px] font-[800] font-extrabold mt-10 leading-[1]">Thanks for subscribing!</h1>
          
          <p class="mb-5 mt-5 md:mt-8">A confirmation email has been sent to <b>ash@loremcompany.com</b>. Please open it and click the button inside to confirm your subscription.</p>
        </div>
        
        <div class="mb-10 md:mb-5 md:my-auto">
          <a href="https://frontendmentor-newsletter-project.vercel.app/"><button class="button2 w-full py-4 border border-black rounded-md text-[hsl(0,0%,100%)] bg-[hsl(234,29%,20%)] md:w-[100%] md:m-auto">Dismiss message</button></a>
        </div>
    </div>

  <script>
      let email = document.querySelector('b');
      
      const params = new URLSearchParams(window.location.search)
      const userInput = params.get('userEmail');
      email.textContent = userInput;
  </script>
</body>

</html>
